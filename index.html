<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict English Dictionary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar-item:hover { background-color: #2d3748; }
        .sidebar-item.active { background-color: #4a5568; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-80 bg-gray-800 flex flex-col border-r border-gray-700">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold text-sky-400">Strict English Spec</h1>
            <p class="text-xs text-gray-400 mt-1">Live Database Documentation</p>
        </div>
        <nav id="keyword-list" class="flex-1 overflow-y-auto p-2 space-y-1">
            <div class="text-center text-gray-500 py-8">Connecting to database...</div>
        </nav>
    </aside>

    <!-- RIGHT CONTENT AREA -->
    <main class="flex-1 flex flex-col overflow-hidden bg-gray-950">
        <div id="details-view" class="flex-1 overflow-y-auto p-8 max-w-4xl mx-auto w-full flex flex-col justify-center items-center text-center">
            <div class="text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                <p class="text-lg font-medium">Select a keyword from the sidebar dictionary to view its strict syntax specification.</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://bkhvrqopgxjvztwjoalr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJraHZycW9wZ3hqdnp0d2pvYWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTYxODQsImV4cCI6MjA5OTM3MjE4NH0.2Dmc3PxZouIbI85IzzRbb2jn_yJPbtZUb9jYt2UuigE'; // Put your safe eyJ... key here!

        // Renamed to DB to prevent clash with the global window.supabase object loaded by the script tag
        const DB = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let dictionaryData = [];

        async function loadDictionary() {
            try {
                const { data, error } = await DB
                    .from('dictionary')
                    .select('keyword, strict_name')
                    .order('keyword', { ascending: true });

                if (error) throw error;
                
                dictionaryData = data;
                renderSidebar();
            } catch (err) {
                console.error("Database connection error:", err);
                document.getElementById('keyword-list').innerHTML = `
                    <div class="text-red-400 p-4 text-xs text-center">
                        Failed to connect to cloud database.<br>${err.message}
                    </div>`;
            }
        }

        function renderSidebar() {
            const listContainer = document.getElementById('keyword-list');
            if (dictionaryData.length === 0) {
                listContainer.innerHTML = '<div class="text-gray-500 text-center py-8 text-sm">Database table is empty. Add entries via Airtable to see them here!</div>';
                return;
            }

            listContainer.innerHTML = dictionaryData.map(item => `
                <button onclick="displayDetails('${item.keyword}', this)" 
                        class="sidebar-item w-full text-left px-3 py-2 rounded text-sm font-medium transition duration-150 flex flex-col gap-0.5">
                    <span class="text-gray-200 truncate font-mono">${item.keyword}</span>
                    <span class="text-xs text-gray-400 font-sans truncate">${item.strict_name || 'No title defined'}</span>
                </button>
            `).join('');
        }

        async function displayDetails(keyword, element) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const detailsContainer = document.getElementById('details-view');
            detailsContainer.innerHTML = '<div class="text-gray-400 animate-pulse text-center">Querying database engine...</div>';

            try {
                const { data, error } = await DB
                    .from('dictionary')
                    .select('*')
                    .eq('keyword', keyword)
                    .single();

                if (error) throw error;

                detailsContainer.className = "flex-1 overflow-y-auto p-8 max-w-4xl mx-auto w-full opacity-100 transition-opacity duration-200 text-left";
                detailsContainer.innerHTML = `
                    <div class="mb-6">
                        <span class="bg-sky-500/10 text-sky-400 text-xs font-semibold tracking-wider uppercase px-2.5 py-1 rounded border border-sky-500/20">Livecode Definition</span>
                        <h2 class="text-3xl font-bold mt-3 text-white font-mono border-b border-gray-800 pb-4">${data.keyword}</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                        <div class="bg-gray-900 p-5 rounded-lg border border-gray-800">
                            <h3 class="text-xs font-bold text-gray-400 tracking-wide uppercase">Strict English Name</h3>
                            <p class="text-lg font-semibold text-sky-400 mt-1">${data.strict_name || 'N/A'}</p>
                        </div>
                        <div class="bg-gray-900 p-5 rounded-lg border border-gray-800">
                            <h3 class="text-xs font-bold text-gray-400 tracking-wide uppercase">Abstract Scope Behavior</h3>
                            <p class="text-sm text-gray-300 mt-2 leading-relaxed">${data.description || 'No descriptive context provided.'}</p>
                        </div>
                    </div>

                    <div class="mt-6 bg-gray-900 p-6 rounded-lg border border-gray-800">
                        <h3 class="text-xs font-bold text-gray-400 tracking-wide uppercase mb-2">Grammar / Syntax Framework Blueprint</h3>
                        <pre class="bg-gray-950 p-4 rounded border border-gray-800 text-amber-400 font-mono text-sm overflow-x-auto whitespace-pre-wrap">${data.syntax || 'No explicit grammar rules applied.'}</pre>
                    </div>

                    <div class="mt-6 bg-gray-900 p-6 rounded-lg border border-gray-800">
                        <h3 class="text-xs font-bold text-gray-400 tracking-wide uppercase mb-2">Live Applied Example Context</h3>
                        <pre class="bg-gray-950 p-4 rounded border border-gray-800 text-emerald-400 font-mono text-sm overflow-x-auto whitespace-pre-wrap">${data.example || 'No execution sample documented.'}</pre>
                    </div>
                `;
            } catch (err) {
                detailsContainer.innerHTML = `<div class="text-red-400 text-center">Error parsing data record.<br>${err.message}</div>`;
            }
        }

        window.onload = loadDictionary;
    </script>
</body>
</html>
